<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — VendorBridge</title>
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div><div class="page-title">Users</div><div class="page-subtitle">Manage system users & roles</div></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openAddUserModal()">+ Add User</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="filter-bar">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search users..." id="search-input" oninput="filterUsers()">
          </div>
          <select id="filter-role" onchange="filterUsers()" style="width:160px;">
            <option value="">All Roles</option>
            <option value="admin">Admin</option>
            <option value="procurement_officer">Procurement Officer</option>
            <option value="manager">Manager</option>
            <option value="vendor">Vendor</option>
          </select>
        </div>
        <div class="table-container">
          <table>
            <thead><tr>
              <th>User</th><th>Email</th><th>Role</th><th>Phone</th><th>Country</th><th>Joined</th><th>Actions</th>
            </tr></thead>
            <tbody id="users-tbody">
              <tr><td colspan="7" class="text-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay hidden" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="user-modal-title">Add User</div>
      <button class="btn btn-secondary btn-sm btn-icon" onclick="modal.close('user-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input id="u-name" placeholder="John Doe"></div>
        <div class="form-group"><label>Email *</label><input id="u-email" type="email" placeholder="john@example.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Password *</label><input id="u-password" type="password" placeholder="Min 6 characters"></div>
        <div class="form-group"><label>Phone</label><input id="u-phone" placeholder="+91-XXXXXXXXXX"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role *</label>
          <select id="u-role">
            <option value="procurement_officer">Procurement Officer</option>
            <option value="manager">Manager</option>
            <option value="vendor">Vendor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group"><label>Country</label><input id="u-country" value="India"></div>
      </div>
      <div class="form-group">
        <label>Additional Info</label>
        <textarea id="u-info" rows="2" placeholder="Department, designation, etc..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="modal.close('user-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-user-btn" onclick="saveUser()">Add User</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../assets/js/app.js"></script>
<script>
if (!auth.requireAuth()) throw '';
if (!auth.hasRole('admin','manager')) {
  window.location.href = '../dashboard/dashboard.html';
  throw '';
}
render_sidebar('users');

let allUsers = [];

async function loadUsers() {
  try {

    const response = await api.get('/users');

    console.log('Users API Response:', response);

    allUsers =
      response.users ||
      response.data?.users ||
      response.data ||
      response ||
      [];

    renderUsers(allUsers);

  } catch (ex) {

    console.error('Load Users Error:', ex);

    toast.error(ex.message || 'Failed to load users');

    document.getElementById('users-tbody').innerHTML = `
      <tr>
        <td colspan="7" class="text-center text-muted">
          Failed to load users
        </td>
      </tr>
    `;
  }
}

function renderUsers(users) {
  if (!users.length) {
    document.getElementById('users-tbody').innerHTML = `
      <tr><td colspan="7"><div class="empty-state">
        <div class="empty-icon">👥</div>
        <div class="empty-title">No users found</div>
        <div class="empty-text">Add your first user to grant system access</div>
      </div></td></tr>`;
    return;
  }
  document.getElementById('users-tbody').innerHTML = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;
               display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;">
            ${avatar_initials(u.name)}
          </div>
          <div>
            <div class="fw-600">${u.name}</div>
            <div class="text-sm text-muted">${u.additional_info || ''}</div>
          </div>
        </div>
      </td>
      <td>${u.email}</td>
      <td>${roleBadge(u.role)}</td>
      <td>${u.phone || '—'}</td>
      <td>${u.country || '—'}</td>
      <td class="text-muted">${fmt_date(u.created_at)}</td>
      <td class="actions-col">
        ${u.id !== auth.user?.id ? `<button class="btn btn-secondary btn-sm" onclick="viewUser(${u.id})">View</button>` : '<span class="badge badge-accent">You</span>'}
      </td>
    </tr>
  `).join('');
}

function roleBadge(role) {
  const map = {
    admin: 'badge-red',
    procurement_officer: 'badge-blue',
    manager: 'badge-orange',
    vendor: 'badge-green',
  };
  const cls = map[role] || 'badge-gray';
  return `<span class="badge ${cls}">${role?.replace('_',' ') || role}</span>`;
}

function filterUsers() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const role = document.getElementById('filter-role').value;
  renderUsers(allUsers.filter(u =>
    (!q || u.name?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q)) &&
    (!role || u.role === role)
  ));
}

function openAddUserModal() {
  document.getElementById('user-modal-title').textContent = 'Add User';
  document.getElementById('save-user-btn').textContent = 'Add User';
  document.getElementById('save-user-btn').onclick = saveUser;
  ['u-name','u-email','u-password','u-phone','u-info'].forEach(id => document.getElementById(id).value='');
  document.getElementById('u-country').value = 'India';
  modal.open('user-modal');
}

async function saveUser() {
  const name = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const password = document.getElementById('u-password').value;
  if (!name || !email || !password) { toast.error('Name, email and password are required'); return; }
  const btn = document.getElementById('save-user-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await api.post('/auth/register', {
      name, email, password,
      phone: document.getElementById('u-phone').value,
      role: document.getElementById('u-role').value,
      country: document.getElementById('u-country').value,
      additional_info: document.getElementById('u-info').value,
    });
    toast.success('User added successfully!');
    modal.close('user-modal');
    loadUsers();
  } catch(ex) { toast.error(ex.message); }
  finally { btn.disabled = false; btn.textContent = 'Add User'; }
}

function viewUser(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  document.getElementById('user-modal-title').textContent = 'User Profile';
  document.getElementById('u-name').value = u.name;
  document.getElementById('u-email').value = u.email;
  document.getElementById('u-phone').value = u.phone || '';
  document.getElementById('u-role').value = u.role;
  document.getElementById('u-country').value = u.country || 'India';
  document.getElementById('u-info').value = u.additional_info || '';
  document.getElementById('u-password').value = '';
  document.getElementById('save-user-btn').textContent = 'Close';
  document.getElementById('save-user-btn').onclick = () => modal.close('user-modal');
  modal.open('user-modal');
}

loadUsers();
</script>
</body>
</html>

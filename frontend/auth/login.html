<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VendorBridge</title>
  <link rel="stylesheet" href="../assets/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
<div class="auth-logo">
  <div class="logo-icon">
    <img src="../assets/images/Logo.png" alt="VendorBridge Logo">
  </div>

  <div class="logo-text">Vendor<span>Bridge</span></div>

  <button id="theme-toggle" class="theme-toggle">
    <i class="fa-solid fa-moon"></i>
  </button>
</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Login to your procurement dashboard</p>

    <div id="error-msg" class="alert alert-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div class="form-group">
  <label>Password</label>
  <div class="password-wrapper">
    <input type="password" id="password" placeholder="••••••••" required>
<span class="password-toggle" onclick="togglePassword('password', this)">
  <i class="fa-regular fa-eye"></i>
</span>
  </div>
</div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
        Login
      </button>
    </form>

    <div style="margin-top:20px; text-align:center; font-size:13px; color:var(--text-secondary)">
      Don't have an account? <a href="register.html">Register</a>
    </div>

    <!-- Demo Credentials -->
    <div style="margin-top:28px; padding:16px; background:var(--bg-secondary); border-radius:8px; border:1px solid var(--border);">
      <div style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px;">Demo Credentials</div>
      <div style="display:grid; gap:6px; font-size:12px; font-family:'JetBrains Mono',monospace;">
        <div class="demo-cred" onclick="fill('admin@vendorbridge.com','password')" style="cursor:pointer; padding:6px 8px; border-radius:4px; display:flex; justify-content:space-between; color:var(--text-secondary);">
          <span>🔑 Admin</span><span>admin@vendorbridge.com</span>
        </div>
        <div class="demo-cred" onclick="fill('officer@vendorbridge.com','password')" style="cursor:pointer; padding:6px 8px; border-radius:4px; display:flex; justify-content:space-between; color:var(--text-secondary);">
          <span>📋 Procurement Officer</span><span>officer@...</span>
        </div>
        <div class="demo-cred" onclick="fill('manager@vendorbridge.com','password')" style="cursor:pointer; padding:6px 8px; border-radius:4px; display:flex; justify-content:space-between; color:var(--text-secondary);">
          <span>✅ Manager</span><span>manager@...</span>
        </div>
        <div class="demo-cred" onclick="fill('vendor1@techcore.com','password')" style="cursor:pointer; padding:6px 8px; border-radius:4px; display:flex; justify-content:space-between; color:var(--text-secondary);">
          <span>🏢 Vendor</span><span>vendor1@techcore.com</span>
        </div>
      </div>
      <div style="font-size:11px; color:var(--text-muted); margin-top:8px;">All passwords: <code style="background:var(--bg-card);padding:1px 5px;border-radius:3px;">password</code></div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>

<script>
// Redirect if already logged in
if (typeof auth !== 'undefined' && auth.isLoggedIn()) {
  navigate('dashboard');
}

/* ==========================
   DEMO CREDENTIALS
========================== */
function fill(email, password, el) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = password;

  document.querySelectorAll('.demo-cred').forEach(item => {
    item.style.background = '';
  });

  if (el) {
    el.style.background = 'var(--accent-dim)';
  }
}

/* ==========================
   LOGIN
========================== */
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  err.classList.add('hidden');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    const res = await api.post('/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });

    auth.login(res.token, res.user);
    navigate('dashboard');

  } catch (ex) {
    err.textContent = ex.message || 'Login failed';
    err.classList.remove('hidden');

    btn.disabled = false;
    btn.textContent = 'Login';
  }
});

/* ==========================
   PASSWORD TOGGLE
========================== */
function togglePassword(id, el) {
  const input = document.getElementById(id);
  const icon = el.querySelector('i');

  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

/* ==========================
   THEME TOGGLE
========================== */
const themeToggle = document.getElementById('theme-toggle');

function updateThemeIcon() {
  const isLight = document.body.classList.contains('light-theme');

  themeToggle.innerHTML = isLight
    ? '<i class="fa-solid fa-sun"></i>'
    : '<i class="fa-solid fa-moon"></i>';
}

// Load saved theme
const savedTheme = localStorage.getItem('theme');

if (savedTheme === 'light') {
  document.body.classList.add('light-theme');
}

updateThemeIcon();

// Toggle Theme
themeToggle.addEventListener('click', () => {
  document.body.classList.toggle('light-theme');

  const isLight = document.body.classList.contains('light-theme');

  localStorage.setItem(
    'theme',
    isLight ? 'light' : 'dark'
  );

  updateThemeIcon();
});

console.log('VendorBridge Login Loaded');
</script>
</body>
</html>

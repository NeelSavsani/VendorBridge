<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — VendorBridge</title>
  <link rel="stylesheet" href="../assets/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box" style="max-width:520px;">
    <div class="auth-logo">
<div class="logo-icon">
  <img src="../assets/images/Logo.png" alt="VendorBridge Logo">
</div>
      <div class="logo-text">Vendor<span>Bridge</span></div>
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join the VendorBridge procurement platform</p>

    <div id="error-msg" class="alert alert-error hidden"></div>
    <div id="success-msg" class="alert alert-success hidden"></div>

    <form id="reg-form">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="company" placeholder="Acme Corp">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="phone" placeholder="+91-XXXXXXXXXX">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role *</label>
          <select id="role">
            <option value="vendor">Vendor</option>
            <option value="procurement_officer">Procurement Officer</option>
            <option value="manager">Manager / Approver</option>
          </select>
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" id="country" placeholder="India" value="India">
        </div>
      </div>
      <div class="form-group" id="vendor-extra" style="display:none;">
        <label>GST Number</label>
        <input type="text" id="gst_number" placeholder="22AAAAA0000A1Z5">
      </div>
      <div class="form-row">
        <div class="form-group">
  <label>Password *</label>
  <div class="password-wrapper">
    <input type="password" id="password" placeholder="Min 6 characters" required>
<span class="password-toggle" onclick="togglePassword('password', this)">
  <i class="fa-regular fa-eye"></i>
</span>  </div>
</div>

<div class="form-group">
  <label>Confirm Password *</label>
  <div class="password-wrapper">
    <input type="password" id="confirm_password" placeholder="Re-enter password" required>
<span class="password-toggle" onclick="togglePassword('password', this)">
  <i class="fa-regular fa-eye"></i>
</span>
  </div>
</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="reg-btn">
        Create Account
      </button>
    </form>
    <div style="margin-top:16px; text-align:center; font-size:13px; color:var(--text-secondary);">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
if (auth.isLoggedIn()) navigate('dashboard');

document.getElementById('role').addEventListener('change', function() {
  document.getElementById('vendor-extra').style.display = this.value === 'vendor' ? 'block' : 'none';
});

document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('error-msg');
  const suc = document.getElementById('success-msg');
  err.classList.add('hidden');

  const pw = document.getElementById('password').value;
  if (pw !== document.getElementById('confirm_password').value) {
    err.textContent = 'Passwords do not match';
    err.classList.remove('hidden');
    return;
  }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating account...';
  try {
    await api.post('/auth/register', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: pw,
      role: document.getElementById('role').value,
      company: document.getElementById('company').value,
      phone: document.getElementById('phone').value,
      country: document.getElementById('country').value,
      gst_number: document.getElementById('gst_number').value,
    });
    suc.textContent = 'Account created successfully! Redirecting to login...';
    suc.classList.remove('hidden');
    setTimeout(() => window.location.href = 'login.html', 2000);
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});
function togglePassword(id, el) {
  const input = document.getElementById(id);
  const icon = el.querySelector('i');

  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

</script>
</body>
</html>
